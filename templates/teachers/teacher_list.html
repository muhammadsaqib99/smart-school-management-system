{% extends 'base.html' %}

{% block content %}
<div class="bg-white rounded-2xl shadow-md overflow-hidden">

    <!-- Header -->
    <div class="flex justify-between items-center px-6 py-4 border-b">
        <h2 class="text-lg font-semibold text-gray-700">Teacher List</h2>

        <a href="{% url 'students:add_teacher' %}"
           class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition text-sm font-semibold">
            + Add Teacher
        </a>
    </div>

    <!-- Table -->
    <div class="overflow-x-auto">
        <table class="w-full text-sm text-left">

            <!-- HEADER -->
            <thead class="bg-gray-50 text-gray-600 uppercase text-xs tracking-wider">
                <tr>
                    <th class="px-6 py-4">Name</th>
                    <th class="px-6 py-4">Subject</th>
                    <th class="px-6 py-4">Class</th>
                    <th class="px-6 py-4">Section</th>
                    <th class="px-6 py-4 text-center">Actions</th>
                </tr>
            </thead>

            <!-- BODY -->
            <tbody class="divide-y">

                {% for t in teachers %}
                <tr class="hover:bg-gray-50 transition duration-200">

                    <td class="px-6 py-4 font-medium text-gray-800">
                        {{ t.name }}
                    </td>

                    <td class="px-6 py-4 text-gray-600">
                        {{ t.subject }}
                    </td>

                    <td class="px-6 py-4 text-gray-600">
                        {{ t.class_obj.name }}
                    </td>

                    <td class="px-6 py-4 text-gray-600">
                        {{ t.section.name }}
                    </td>

                    <td class="px-6 py-4 text-center space-x-2">

                        <a href="{% url 'students:edit_teacher' t.id %}"
                           class="px-3 py-1.5 bg-yellow-100 text-yellow-700 rounded-lg hover:bg-yellow-200 transition text-xs font-semibold">
                            Edit
                        </a>

                        <a href="{% url 'students:delete_teacher' t.id %}"
                           class="px-3 py-1.5 bg-red-100 text-red-600 rounded-lg hover:bg-red-200 transition text-xs font-semibold">
                            Delete
                        </a>

                    </td>

                </tr>
                {% empty %}
                <tr>
                    <td colspan="5" class="text-center py-6 text-gray-400">
                        No teachers found
                    </td>
                </tr>
                {% endfor %}

            </tbody>

        </table>
    </div>

</div>

{% endblock %}
