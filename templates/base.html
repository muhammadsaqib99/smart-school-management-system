<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Smart School{% endblock %}</title>

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
        }
    </style>
</head>

<body class="bg-gray-100">

<div class="flex min-h-screen">

    
<!--SIDEBAR -->
<aside class="w-64 bg-gray-900 text-gray-300 flex flex-col">

    <!-- LOGO -->
    <div class="p-6 text-2xl font-bold text-white border-b border-gray-800">
        Smart School
    </div>

    <!-- NAV -->
    <nav class="flex-1 p-4 space-y-2">

        <!-- Dashboard -->
        <a href="{% url 'students:dashboard' %}"
           class="flex items-center gap-3 px-4 py-2 rounded-lg hover:bg-gray-800 transition
           {% if request.path == '/' %} bg-gray-800 text-white {% endif %}">
            <i data-lucide="layout-dashboard"></i>
            Dashboard
        </a>

        {% if request.user.profile.role == 'admin' %}

        <!-- Students -->
        <a href="{% url 'students:student_list' %}"
           class="flex items-center gap-3 px-4 py-2 rounded-lg hover:bg-gray-800 transition">
            <i data-lucide="users"></i>
            Students
        </a>

        <!-- Teachers -->
        <a href="{% url 'students:teacher_list' %}"
           class="flex items-center gap-3 px-4 py-2 rounded-lg hover:bg-gray-800 transition">
            <i data-lucide="user-check"></i>
            Teachers
        </a>

        <!-- Classes -->
        <a href="{% url 'students:class_list' %}"
           class="flex items-center gap-3 px-4 py-2 rounded-lg hover:bg-gray-800 transition">
            <i data-lucide="layers"></i>
            Classes
        </a>
          <!-- Profile -->
           <a href="{% url 'students:profile' %}"
               class="flex items-center gap-3 px-4 py-2 rounded-lg hover:bg-gray-800 transition">
             <i data-lucide="user"></i>
                Profile
            </a>
        {% endif %}

    </nav>

    <!-- FOOTER -->
    <div class="p-4 border-t border-gray-800 text-sm text-gray-400">
        Logged in as <br>
        <span class="text-white font-semibold">
            {{ request.user.username }}
        </span>
    </div>

</aside>

    <!-- MAIN CONTENT -->
    <div class="flex-1 flex flex-col">

        <!-- TOPBAR -->
        <header class="bg-white shadow px-6 py-4 flex justify-between items-center">

            <h1 class="text-lg font-semibold text-gray-700">
                Dashboard
            </h1>

            <div class="flex items-center space-x-4">

                <span class="text-gray-600 text-sm">
                    {{ request.user.username }}
                </span>

                <a href="{% url 'logout' %}"
                   class="text-red-500 hover:underline text-sm">
                    Logout
                </a>

            </div>

        </header>

        <!-- PAGE CONTENT -->
        <main class="p-6">
            {% block content %}
            {% endblock %}
        </main>

    </div>

</div>
<script>
    lucide.createIcons();
</script>
</body>
</html>
