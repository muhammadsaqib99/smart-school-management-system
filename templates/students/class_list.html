{% extends 'base.html' %}

{% block content %}

<div class="max-w-4xl mx-auto bg-white p-6 rounded shadow">

    <div class="flex justify-between items-center mb-4">
        <h2 class="text-2xl font-bold">Class List</h2>

        <a href="{% url 'students:add_class' %}"
           class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700">
            + Add Class
        </a>
    </div>

    <table class="w-full border border-gray-200">
        <thead class="bg-gray-100">
            <tr>
                <th class="p-2 border">ID</th>
                <th class="p-2 border">Class Name</th>
                <th class="p-2 border">Actions</th>
            </tr>
        </thead>

        <tbody>
            {% for c in classes %}
            <tr class="text-center">
                <td class="p-2 border">{{ c.id }}</td>
                <td class="p-2 border">{{ c.name }}</td>
                <td class="p-2 border space-x-2">
                    <a href="{% url 'students:edit_class' c.id %}"
                       class="bg-yellow-500 text-white px-2 py-1 rounded">
                         Edit
                    </a>
                    <a href="{% url 'students:delete_class' c.id %}"
                      class="bg-red-500 text-white px-2 py-1 rounded">
                       Delete
                    </a>
                </td>
            </tr>
            {% empty %}
            <tr>
                <td colspan="3" class="p-4 text-center text-gray-500">
                    No classes added yet
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>

</div>

{% endblock %}
