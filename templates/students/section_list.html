{% extends 'base.html' %}

{% block content %}

<div class="max-w-5xl mx-auto bg-white p-6 rounded shadow">

    <div class="flex justify-between items-center mb-4">
        <h2 class="text-2xl font-bold">Section List</h2>

        <a href="{% url 'students:add_section' %}"
           class="bg-blue-600 text-white px-4 py-2 rounded">
            + Add Section
        </a>
    </div>

    <table class="w-full border">
        <thead class="bg-gray-100">
            <tr>
                <th class="p-2 border">ID</th>
                <th class="p-2 border">Section Name</th>
                <th class="p-2 border">Class</th>
                <th class="p-2 border">Actions</th>
            </tr>
        </thead>

        <tbody>
            {% for s in sections %}
            <tr class="text-center">
                <td class="p-2 border">{{ s.id }}</td>
                <td class="p-2 border">{{ s.name }}</td>
                <td class="p-2 border">{{ s.class_obj.name }}</td>

                <td class="p-2 border space-x-2">
                    <a href="{% url 'students:edit_section' s.id %}"
                       class="bg-yellow-500 text-white px-2 py-1 rounded">
                        Edit
                    </a>

                    <a href="{% url 'students:delete_section' s.id %}"
                       class="bg-red-500 text-white px-2 py-1 rounded">
                        Delete
                    </a>
                </td>
            </tr>

            {% empty %}
            <tr>
                <td colspan="4" class="p-4 text-center text-gray-500">
                    No sections added
                </td>
            </tr>
            {% endfor %}
        </tbody>

    </table>

</div>

{% endblock %}
